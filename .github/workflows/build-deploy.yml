# build-deploy.yml - OBSOLETE: kept for reference only.
#
# This reusable-workflow approach was abandoned during Phase 4 because GitHub
# Actions forbids both `env:` on `uses:` jobs AND `${{ secrets.X }}` in `with:`
# inputs. There is no way to pass secret-derived build-args to a reusable
# workflow.
#
# The working pattern is: each app's deploy.yml does the build inline and
# calls infra/scripts/* for the deploy + notify steps. See
# docs/adding-a-new-app.md for the current template.
#
# This file is intentionally not referenced by any caller. Do not delete —
# it documents the dead-end for future maintainers.
name: build-deploy-DEPRECATED
on:
  workflow_call:
    inputs: {}
    secrets: {}
jobs:
  deprecated:
    runs-on: ubuntu-latest
    steps:
      - run: echo "This workflow is deprecated. See docs/adding-a-new-app.md."
