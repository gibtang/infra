# Template for app deploy.yml — copy this file into each app repo at
# .github/workflows/deploy.yml and substitute the {{PLACEHOLDERS}}.
#
# This is a SELF-CONTAINED workflow (does not use gibtang/infra's reusable
# workflow). GitHub Actions forbids passing secret-derived values to a
# reusable workflow via `with:` inputs, so the build must happen inline.
# The shared scripts (coolify-deploy.sh, telegram-notify.sh) are pulled in
# via checkout of gibtang/infra.
#
# Placeholders to replace:
#   {{IMAGE}}        e.g. ghcr.io/gibtang/check-mcc
#   {{APP_UUID}}     Coolify application UUID
#   {{DOCKERFILE}}   e.g. Dockerfile (default)
#   {{CONTEXT}}      e.g. . (default) or gunpla-api
#   {{BUILD_ARGS}}   blank, OR a block of:
#                      --build-arg NAME="$NAME" \
#                    one per line, with matching env: bindings below
#   {{ENV_BINDINGS}} blank, OR a block of:
#                      NAME: ${{ secrets.NAME }}
#                    one per build-arg
name: deploy
on:
  push:
    branches: [main]
  workflow_dispatch:
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
env:
  COOLIFY_API_URL: https://coolify-api.feedcode.dev
jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4

      - name: Checkout infra (scripts)
        uses: actions/checkout@v4
        with:
          repository: gibtang/infra
          path: .infra

      - name: Notify start
        if: always()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT: ${{ secrets.TELEGRAM_CHAT }}
        run: |
          msg="🔨 <b>{{IMAGE}}</b> #${{ github.run_number }} — build started"
          bash .infra/scripts/telegram-notify.sh "$msg" || true

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build
        env:
          {{ENV_BINDINGS}}
        run: |
          set -euo pipefail
          docker build \
            {{BUILD_ARGS}}
            -f "{{DOCKERFILE}}" \
            -t "{{IMAGE}}:latest" \
            -t "{{IMAGE}}:github-${{ github.run_number }}" \
            "{{CONTEXT}}"

      - name: Push
        run: |
          docker push "{{IMAGE}}:latest"
          docker push "{{IMAGE}}:github-${{ github.run_number }}"

      - name: Deploy via Coolify
        env:
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
        run: |
          bash .infra/scripts/coolify-deploy.sh "{{APP_UUID}}"

      - name: Notify success
        if: success()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT: ${{ secrets.TELEGRAM_CHAT }}
        run: |
          msg="✅ <b>{{IMAGE}}</b> #${{ github.run_number }} — deploy SUCCESS: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          bash .infra/scripts/telegram-notify.sh "$msg" || true

      - name: Notify failure
        if: failure()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT: ${{ secrets.TELEGRAM_CHAT }}
        run: |
          msg="❌ <b>{{IMAGE}}</b> #${{ github.run_number }} — build FAILED: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          bash .infra/scripts/telegram-notify.sh "$msg" || true

      - name: Notify abort
        if: cancelled()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT: ${{ secrets.TELEGRAM_CHAT }}
        run: |
          msg="⏹ <b>{{IMAGE}}</b> #${{ github.run_number }} — build ABORTED"
          bash .infra/scripts/telegram-notify.sh "$msg" || true
